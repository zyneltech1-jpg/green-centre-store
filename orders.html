<!DOCTYPE html>
<html>
<head>
  <title>My Orders</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="top-header">
  <h2>My Orders</h2>
</header>

<div class="page-content">

  <div id="orderHistoryList"></div>

  <div id="ordersContainer"></div>

</div>

<script>
function getOrders() {
  return JSON.parse(localStorage.getItem("orders")) || [];
}

function renderOrders() {
  const container = document.getElementById("orderHistoryList");
  const orders = getOrders();

  if (!orders.length) {
    ordersContainer.innerHTML = `
  <div style="text-align:center; padding:40px;">
    <h3>No orders yet 🛒</h3>
    <p>Start shopping to see your orders here</p>
    <a href="index.html" class="btn">Shop Now</a>
  </div>
`;
    return;
  }

  container.innerHTML = orders.map((order, index) => `
    <div class="order-card" onclick="viewOrder(${index})">
      
      <div class="order-top">
        <h4>Order #${orders.length - index}</h4>
        <span class="status ${order.status}">${order.status}</span>
      </div>

      <p>${new Date(order.createdAt).toLocaleString()}</p>

      <p>${order.items.length} item(s)</p>

      <h3>₦${order.total}</h3>

    </div>
  `).join("");
}

function viewOrder(index) {
  const orders = JSON.parse(localStorage.getItem("orders")) || [];
  const order = orders[index];

  localStorage.setItem("selectedOrder", JSON.stringify(order));

  window.location.href = "order-details.html";
}

renderOrders();

const ordersContainer = document.getElementById("ordersContainer");

function getStatusColor(status) {
  if (status === "Pending") return "orange";
  if (status === "Processing") return "blue";
  if (status === "Delivered") return "green";
  return "gray";
}

function loadOrders() {
  const orders = JSON.parse(localStorage.getItem("orders")) || [];

  ordersContainer.innerHTML = orders.map((order, index) => `
    <div class="order-card" onclick="viewOrder(${index})">
      
      <div class="order-top">
        <strong>${order.id}</strong>
        <span style="color:${getStatusColor(order.status)}">
          ${order.status}
        </span>
      </div>

      <p>${order.date}</p>
      <p>${order.items.length} item(s)</p>
      <p>Payment: ${order.payment}</p>

      <h2>₦${order.total}</h2>

      <button onclick="event.stopPropagation(); trackOrder(${index})">
        Track Order
      </button>

    </div>
  `).join("");
}

loadOrders();

function generateOrderCode() {
  return function generateOrderCode() {
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  return "GC-" + 
    letters[Math.floor(Math.random()*26)] +
    letters[Math.floor(Math.random()*26)] +
    Math.floor(100000 + Math.random()*900000);
}
}

function saveOrder(cart, totalPrice, paymentMethod) {
  const orders = JSON.parse(localStorage.getItem("orders")) || [];

  const newOrder = {
    id: generateOrderCode(),
    date: new Date().toLocaleString(),
    items: cart,
    total: totalPrice,
    payment: paymentMethod,
    status: "Pending"
  };

  orders.unshift(newOrder);
  localStorage.setItem("orders", JSON.stringify(orders));
}

function trackOrder(index) {
  const orders = JSON.parse(localStorage.getItem("orders")) || [];
  const order = orders[index];

  let message = "";

  if (order.status === "Pending") {
    message = "Your order has been received.";
  } else if (order.status === "Processing") {
    message = "Your order is being prepared.";
  } else {
    message = "Your order has been delivered.";
  }

  alert(message);
}
</script>

</body>
</html>
