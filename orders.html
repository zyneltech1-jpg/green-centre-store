<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="top-header">
    <div class="top-row">
      <h2>My Orders</h2>
      <a href="account.html">← Back</a>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="page-content">
    <div id="orderHistoryList"></div>
  </main>

  <nav class="bottom-nav">
      <a href="index.html" class="nav-item active">
        <span>🏠</span>
        <small>Home</small>
      </a>
      <a href="categories.html" class="nav-item" onclick="setSelectedCategory('All')">
        <span>📂</span>
        <small>Categories</small>
      </a>
      <a href="cart.html" class="nav-item">
        <span>🛒</span>
        <small>Cart</small>
      </a>
      <a href="account.html" class="nav-item">
        <span>👤</span>
        <small>Account</small>
      </a>
    </nav>

  <!-- SCRIPT -->
  <script>
function loadOrders() {
    const orders = JSON.parse(localStorage.getItem("orders")) || [];
    const container = document.getElementById("orderHistoryList");

    if (!container) return;

    if (orders.length === 0) {
        container.innerHTML = "<p>No orders yet</p>";
        return;
    }

    container.innerHTML = orders.map((order, index) => `
        <div class="order-card" onclick="viewOrder(${index})">
            <h3>${order.id}</h3>
            <p>${new Date(order.createdAt).toLocaleString()}</p>
            <p>${order.items.length} item(s)</p>
            <p>Status: ${order.status}</p>
            <h4>₦${order.total}</h4>
        </div>
    `).join("");
}

function viewOrder(index) {
    localStorage.setItem("selectedOrderIndex", index);
    window.location.href = "order-details.html";
}

document.addEventListener("DOMContentLoaded", loadOrders);
</script>

</body>
</html>
