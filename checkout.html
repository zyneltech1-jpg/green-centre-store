<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="top-header">
    <div class="top-row">
        <h2>Checkout</h2>
        <a href="cart.html">Back to Cart</a>
    </div>
</header>

<main class="page-content">

    <!-- CART ITEMS -->
    <div id="checkoutItems"></div>

    <!-- SUMMARY -->
    <div class="checkout-summary">
        <p>Subtotal: <span id="subtotal">₦0</span></p>
        <p>Delivery: <span id="delivery">₦3,000</span></p>
        <h3>Total: <span id="total">₦0</span></h3>
    </div>

    <!-- PAYMENT -->
    <div class="payment-section">
        <h3>Payment Method</h3>

        <label>
            <input type="radio" name="paymentMethod" value="Pay Online" checked>
            Pay Online
        </label>

        <label>
            <input type="radio" name="paymentMethod" value="Bank Transfer">
            Bank Transfer
        </label>

        <label>
            <input type="radio" name="paymentMethod" value="Pay on Delivery">
            Pay on Delivery
        </label>
    </div>

    <!-- BUTTON -->
    <button id="placeOrderBtn" class="primary-btn">Place Order</button>

</main>

</body>

<script>
/* =========================
   LOAD CHECKOUT
========================= */
function loadCheckout() {
    const cart = JSON.parse(localStorage.getItem("cart")) || [];
    const container = document.getElementById("checkoutItems");

    if (!container) return;

    if (cart.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <h3>No items in cart</h3>
                <a href="index.html">Start Shopping</a>
            </div>
        `;
        return;
    }

    let subtotal = 0;

    container.innerHTML = cart.map(item => {
        const itemTotal = item.price * item.quantity;
        subtotal += itemTotal;

        return `
            <div class="checkout-item">
                <h4>${item.name}</h4>
                <p>Qty: ${item.quantity}</p>
                <p>₦${itemTotal.toLocaleString()}</p>
            </div>
        `;
    }).join("");

    const delivery = 3000;
    const total = subtotal + delivery;

    document.getElementById("subtotal").textContent = "₦" + subtotal.toLocaleString();
    document.getElementById("total").textContent = "₦" + total.toLocaleString();
}

/* =========================
   PLACE ORDER
========================= */
function placeOrder() {
    const cart = JSON.parse(localStorage.getItem("cart")) || [];

    if (cart.length === 0) {
        alert("Your cart is empty.");
        return;
    }

    const paymentMethod =
        document.querySelector('input[name="paymentMethod"]:checked')?.value || "Pay Online";

    const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    const delivery = 3000;
    const total = subtotal + delivery;

    const order = {
        id: "ORD-" + Date.now(),
        items: cart,
        total: total,
        status: "Processing",
        paymentMethod: paymentMethod,
        createdAt: new Date().toISOString()
    };

    const existingOrders = JSON.parse(localStorage.getItem("orders")) || [];
    existingOrders.unshift(order);

    localStorage.setItem("orders", JSON.stringify(existingOrders));

    // CLEAR CART
    localStorage.removeItem("cart");

    alert("Order placed successfully!");

    window.location.href = "orders.html";
}

/* =========================
   INIT
========================= */
document.addEventListener("DOMContentLoaded", () => {
    loadCheckout();

    const btn = document.getElementById("placeOrderBtn");
    if (btn) {
        btn.addEventListener("click", placeOrder);
    }
});
</script>

</html>
