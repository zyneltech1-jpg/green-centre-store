<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout - Green Centre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="checkout">
  <div class="app-shell">
    <header class="top-header">
      <div class="top-row">
        <div class="page-title">Checkout</div>
        <a href="cart.html" class="small-top-link">Back to Cart</a>
      </div>
    </header>

    <main class="page-content">
      <section class="section-card form-card">
        <div class="section-head no-link">
          <h2>Customer Details</h2>
        </div>

        <form id="checkoutForm" class="checkout-form">
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="Name" placeholder="Enter full name" required>
          </div>

          <div class="form-group">
            <label for="emailAddress">Email Address</label>
            <input type="email" id="emailAddress" name="Email" placeholder="Enter email address" required>
          </div>

          <div class="form-group">
            <label for="phoneNumber">Phone Number</label>
            <input type="tel" id="phoneNumber" name="Phone" placeholder="Enter phone number" required>
          </div>

          <div class="form-group">
            <label for="deliveryAddress">Delivery Address</label>
            <textarea id="deliveryAddress" name="Address" rows="4" placeholder="Enter delivery address" required></textarea>
          </div>

          <div class="form-group">
            <label for="city">City</label>
            <input type="text" id="city" name="City" placeholder="Enter city" required>
          </div>

          <div class="form-group">
            <label for="state">State</label>
            <input type="text" id="state" name="State" placeholder="Enter state" required>
          </div>

          <input type="hidden" name="_captcha" value="false">
           <input type="hidden" name="_subject" value="New Order Received">
           <input type="hidden" name="_template" value="table">

      <!-- AUTO FILLED -->
       <input type="hidden" name="Order ID" id="orderIdInput">
       <input type="hidden" name="Order Status" id="orderStatusInput">
       <input type="hidden" name="Order Date" id="orderDateInput">
       <input type="hidden" name="Estimated Ready Date" id="readyDateInput">
       <input type="hidden" name="Cart Items" id="cartItemsInput">
       <input type="hidden" name="Total Amount" id="totalAmountInput">
        </form>
      </section>

      <section class="section-card form-card">
        <div class="section-head no-link">
          <h2>Select Payment Method</h2>
        </div>

        <div class="payment-box checkout-payment">
          <label class="radio-row">
            <input type="radio" name="paymentMethod" value="Pay Online" checked>
            Pay Online
          </label>

          <label class="radio-row">
            <input type="radio" name="paymentMethod" value="Pay on Delivery">
            Pay on Delivery
          </label>
        </div>
      </section>

      <section class="section-card" id="checkoutSummaryWrap">
        <div class="section-head no-link">
          <h2>Order Summary</h2>
        </div>

        <div id="checkoutItems"></div>

        <div class="summary-row">
          <span>Subtotal</span>
          <strong id="checkoutSubtotal">₦0</strong>
        </div>

        <div class="summary-row">
          <span>Delivery Fee</span>
          <strong id="checkoutDelivery">₦3,000</strong>
        </div>

        <div class="summary-row total-row">
          <span>Total</span>
          <strong id="checkoutTotal">₦0</strong>
        </div>

        <button id="placeOrderBtn" type="submit" form="checkoutForm" class="primary-btn full-btn">Place Order</button>
      </section>
    </main>

    <span id="checkoutSubtotal"></span>
<span id="checkoutDelivery"></span>
<span id="checkoutTotal"></span>
<div id="checkoutItems"></div>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <span>🏠</span>
        <small>Home</small>
      </a>
      <a href="categories.html" class="nav-item">
        <span>📂</span>
        <small>Categories</small>
      </a>
      <a href="cart.html" class="nav-item active">
        <span>🛒</span>
        <small>Cart</small>
      </a>
      <a href="account.html" class="nav-item">
        <span>👤</span>
        <small>Account</small>
      </a>
    </nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
  emailjs.init("3kqStKKyxU1RIDXbZ");
})();
</script>

  <script type="module" src="app.js"></script>
  
</body>
</html>
