<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - Green Centre</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-header">
      <div class="top-row">
        <div class="page-title">Admin Dashboard</div>
        <button id="logoutBtn" class="danger-btn">Logout</button>
      </div>
    </header>

    <main class="page-content">
      <section class="section-card form-card">
        <div class="section-head no-link">
          <h2>Add Product</h2>
        </div>

        <form id="productForm" class="checkout-form">
          <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="productName" required>
          </div>

          <div class="form-group">
            <label>Price</label>
            <input type="number" id="productPrice" required>
          </div>

          <div class="form-group">
            <label>Category</label>
            <input type="text" id="productCategory" required>
          </div>

          <div class="form-group">
            <label>Image URL</label>
            <input type="text" id="productImage" required>
          </div>

          <div class="form-group">
            <label>Description</label>
            <textarea id="productDescription" rows="4" required></textarea>
          </div>

          <button type="submit" class="primary-btn">Save Product</button>
        </form>
      </section>

      <section class="section-card">
        <div class="section-head no-link">
          <h2>All Products</h2>
        </div>
        <div id="adminProducts"></div>
      </section>

      <section class="section-card">
        <div class="section-head no-link">
          <h2>Orders</h2>
        </div>
        <div id="adminOrders"></div>
      </section>
    </main>
  </div>

  <script type="module" src="admin.js"></script>
  <script type="module" src="firebase-auth.js"></script>
</body>
</html>
