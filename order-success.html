<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Success</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="order-success">
  <div class="app-shell">
    <div class="page-header">
      <h2>Order Successful</h2>
      <a href="index.html">Back Home</a>
    </div>

    <div class="success-card">
      <h3>Your order has been placed successfully</h3>
      <p><strong>Order ID:</strong> <span id="successOrderId"></span></p>
      <p><strong>Name:</strong> <span id="successName"></span></p>
      <p><strong>Phone:</strong> <span id="successPhone"></span></p>
      <p><strong>Email:</strong> <span id="successEmail"></span></p>
      <p><strong>Address:</strong> <span id="successAddress"></span></p>
      <p><strong>Payment:</strong> <span id="successPayment"></span></p>
      <p><strong>Total:</strong> <span id="successTotal"></span></p>

      <a href="index.html" class="primary-btn">Continue Shopping</a>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
