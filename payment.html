<!DOCTYPE html>
<html>
<head>
  <title>Payment</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="top-header">
  <h2>Checkout</h2>
</header>

<div class="page-content">

  <h3>Total Amount</h3>
  <h2 id="paymentTotal">₦0</h2>

  <h3>Select Payment Method</h3>

  <div class="payment-option" onclick="selectPayment('Card')">💳 Pay with Card</div>
  <div class="payment-option" onclick="selectPayment('Transfer')">🏦 Bank Transfer</div>
  <div class="payment-option" onclick="selectPayment('Cash')">💵 Pay on Delivery</div>

  <button onclick="completePayment()">Complete Order</button>

</div>

<nav class="bottom-nav">
      <a href="index.html" class="nav-item active">
        <span>🏠</span>
        <small>Home</small>
      </a>
      <a href="categories.html" class="nav-item" onclick="setSelectedCategory('All')">
        <span>📂</span>
        <small>Categories</small>
      </a>
      <a href="cart.html" class="nav-item">
        <span>🛒</span>
        <small>Cart</small>
      </a>
      <a href="account.html" class="nav-item">
        <span>👤</span>
        <small>Account</small>
      </a>
    </nav>

<script>
let selectedPayment = "";

function loadTotal() {
  const cart = JSON.parse(localStorage.getItem("cart")) || [];

  const total = cart.reduce((sum, item) => {
    return sum + (item.price * item.qty);
  }, 0);

  document.getElementById("paymentTotal").innerText = "₦" + total;
}

function selectPayment(method) {
  selectedPayment = method;
  alert("Selected: " + method);
}

function completePayment() {
  if (!selectedPayment) return alert("Select payment method");

  const cart = JSON.parse(localStorage.getItem("cart")) || [];

  const total = cart.reduce((sum, item) => {
    return sum + (item.price * item.qty);
  }, 0);

  const orders = JSON.parse(localStorage.getItem("orders")) || [];

  orders.unshift({
    items: cart,
    total,
    paymentMethod: selectedPayment,
    createdAt: new Date().toISOString()
  });

  localStorage.setItem("orders", JSON.stringify(orders));
  localStorage.removeItem("cart");

  window.location.href = "order-success.html";
}

loadTotal();
</script>

</body>
</html>
