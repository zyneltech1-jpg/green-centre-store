<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account - Green Centre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <main class="auth-app">
    <section class="auth-screen">
      <div class="top-link-row">
        <a href="welcome.html" class="back-link">← Back</a>
      </div>

      <div class="logo-wrap small-logo-wrap">
        <div class="logo-circle small-logo">
          <img src="logo.jpg" alt="Green Centre Logo">
        </div>
      </div>

      <div class="auth-copy auth-copy-left">
        <h1>Create Account</h1>
        <p>Join Green Centre to shop trusted wellness products.</p>
      </div>

      <form id="signupForm" class="auth-form">
        <div class="form-grid two-col">
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" placeholder="Enter first name" required>
          </div>

          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" placeholder="Enter last name" required>
          </div>
        </div>

        <div class="form-group">
          <label for="signupEmail">Email Address</label>
          <input type="email" id="signupEmail" placeholder="Enter email address" required>
        </div>

        <div class="form-group">
          <label for="phoneNumber">Phone Number</label>
          <input type="tel" id="phoneNumber" placeholder="Enter phone number" required>
        </div>

        <div class="form-group">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" placeholder="Enter password" required>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Confirm password" required>
        </div>

        <button type="submit" class="primary-btn full-btn">Create Account</button>
      </form>

      <p class="auth-switch">
        Already have an account?
        <a href="signin.html">Sign In</a>
      </p>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
