<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome - Green Centre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <main class="auth-app">
    <section class="auth-screen welcome-screen">
      <div class="logo-wrap">
        <div class="logo-circle">
          <img src="logo.jpg" alt="Green Centre Logo">
        </div>
      </div>

      <div class="auth-copy">
        <h1>Welcome to Green Centre</h1>
        <p>Shop trusted natural wellness products easily and securely.</p>
      </div>

      <div class="auth-actions">
        <a href="signup.html" class="primary-btn">Create Account</a>
        <a href="signin.html" class="secondary-btn">Sign In</a>
      </div>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
